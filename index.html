<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Cloud Drive</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef2f7;
}

header{
    background:#1f4ed8;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header input{
    width:250px;
    padding:10px;
    border:none;
    border-radius:5px;
}

.container{
    width:90%;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    margin-bottom:25px;
    border-radius:10px;
    box-shadow:0 5px 12px rgba(0,0,0,.15);
}

h1,h2{
    margin-top:0;
}
button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#1d4ed8;
}

input[type=file]{
    margin:15px 0;
}

.progress{
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.bar{
    width:0%;
    height:100%;
    background:#22c55e;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#2563eb;
    color:white;
}

th,td{
    padding:15px;
    text-align:center;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#f8f8f8;
}
.footer{
    text-align:center;
    color:#666;
    padding:20px;
}

</style>

</head>

<body>

<header>

<h1>☁ Personal Cloud Drive</h1>

<input type="text" placeholder="Search files">

</header>

<div class="container">

<div class="card">

<h2>📤 Upload File</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="file">

<br>

<button type="submit">

Upload

</button>

</form>

</div>

<div class="card">

<h2>💾 Storage Usage</h2>

<div class="progress">

<div class="bar"></div>

</div>

<p><b>0 MB</b> used of <b>5 GB</b></p>

</div>

<div class="card">

<h2>📁 Recent Files</h2>

<table>

<tr>

<th>File Name</th>

<th>Type</th>

<th>Size</th>

<th>Action</th>

</tr>

<tr>

<td>No files uploaded</td>

<td>-</td>

<td>-</td>

<td>-</td>

</tr>

</table>

</div>

</div>

<div class="footer">

Personal Cloud Drive © 2026

</div>

</body>

</html>
